<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascend Tech BD | AI সহায়তা</title>
    
    <style>
        /* ===== CSS VARIABLES & DEFAULT FONTS ===== */
        :root {
            --bg-deep:       #06091a;
            --bg-mid:        #0a1122;
            --accent:        #3b82f6;
            --accent-glow:   rgba(59,130,246,0.35);
            --accent-dark:   #1d4ed8;
            --user-bubble:   linear-gradient(135deg,#2563eb,#1d4ed8);
            --ai-bubble:     rgba(255,255,255,0.06);
            --border:        rgba(255,255,255,0.08);
            --text-main:     #e2e8f0;
            --text-muted:    #64748b;
        }

        /* আপনার ওয়েবসাইটের ডিফল্ট ফন্ট ব্যবহার করা হয়েছে */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: sans-serif; 
        }

        body {
            background-color: var(--bg-mid);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== NAV ===== */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(6, 9, 26, 0.95);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo-container { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .nav-logo { height: 40px; }
        .logo-text { font-size: 20px; font-weight: bold; color: var(--accent); }
        
        .nav-links { display: flex; gap: 20px; }
        .nav-links a {
            text-decoration: none;
            color: #94a3b8;
            font-size: 15px;
            transition: 0.3s;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--accent); }
        .menu-icon { display: none; font-size: 24px; color: white; cursor: pointer; }

        /* ===== CHAT LAYOUT ===== */
        .page-wrapper {
            flex: 1;
            max-width: 800px;
            width: 95%;
            margin: 30px auto;
            display: flex;
            flex-direction: column;
        }

        .chat-box {
            flex: 1;
            background: rgba(6, 9, 26, 0.5);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 500px;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message-row { display: flex; gap: 10px; animation: fadeIn 0.3s; }
        .message-row.user { flex-direction: row-reverse; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .msg-bubble { padding: 10px 15px; border-radius: 12px; font-size: 14px; max-width: 80%; }
        .msg-bubble.ai { background: var(--ai-bubble); border: 1px solid var(--border); }
        .msg-bubble.user { background: var(--user-bubble); color: white; }

        /* ===== INPUT AREA ===== */
        .chat-input-area {
            padding: 15px;
            background: rgba(255, 255, 255, 0.02);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            color: white;
            outline: none;
        }
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .nav-links { display: none; }
            .menu-icon { display: block; }
            .nav-links.active {
                display: flex;
                flex-direction: column;
                position: absolute;
                top: 60px; right: 5%;
                background: var(--bg-deep);
                padding: 20px; border-radius: 10px; border: 1px solid var(--border);
            }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo-container" onclick="location.href='index.html'">
        <img src="assets/images/logo.png" alt="Logo" class="nav-logo">
        <span class="logo-text">Ascend Tech BD</span>
    </div>
    <div class="menu-icon" onclick="toggleMenu()">☰</div>
    <div class="nav-links" id="navLinks">
        <a href="index.html">হোম</a>
        <a href="about.html">আমাদের সম্পর্কে</a>
        <a href="services.html">সেবাসমূহ</a>
        <a href="projects.html">প্রজেক্ট</a>
        <a href="research.html">রিসার্চ</a>
        <a href="aichat.html" class="active">AI সহায়তা</a>
    </div>
</nav>

<div class="page-wrapper">
    <div class="chat-box">
        <div id="messages"></div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="আপনার প্রশ্ন এখানে লিখুন..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">পাঠান</button>
        </div>
    </div>
</div>

<script>
    let conversationHistory = [];

    // শুরুতেই স্বাগত বার্তা
    window.onload = () => {
        appendMessage('ai', "স্বাগতম! আমি Aria। Ascend Tech BD-র পক্ষ থেকে আপনাকে কীভাবে সাহায্য করতে পারি?");
    };

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        appendMessage('user', text);
        conversationHistory.push({ role: 'user', content: text });
        input.value = '';

        try {
            // আপনার Render সার্ভার লিঙ্ক
            const SERVER_URL = 'https://ascendtechbd-github-io.onrender.com/chat'; 

            const response = await fetch(SERVER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: 'llama-3.3-70b-versatile', 
                    messages: [
                        { role: 'system', content: 'তুমি Aria, Ascend Tech BD-র একজন বন্ধুত্বপূর্ণ AI রিসেপশনিস্ট। বাংলায় কথা বলো।' },
                        ...conversationHistory
                    ]
                })
            });

            const data = await response.json();
            const reply = data.choices[0].message.content;
            
            appendMessage('ai', reply);
            conversationHistory.push({ role: 'assistant', content: reply });
        } catch (err) {
            appendMessage('ai', "⚠️ দুঃখিত, এই মুহূর্তে সার্ভারের সাথে যোগাযোগ করা যাচ্ছে না। দয়া করে কিছুক্ষণ পর আবার চেষ্টা করুন।");
        }
    }

    function appendMessage(role, text) {
        const msgDiv = document.getElementById('messages');
        const row = document.createElement('div');
        row.className = `message-row ${role}`;
        row.innerHTML = `<div class="msg-bubble ${role}">${text.replace(/\n/g, '<br>')}</div>`;
        msgDiv.appendChild(row);
        msgDiv.scrollTop = msgDiv.scrollHeight;
    }

    function toggleMenu() {
        document.getElementById('navLinks').classList.toggle('active');
    }
</script>

</body>
</html>
