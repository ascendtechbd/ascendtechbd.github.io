<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI সহায়তা | Ascend Tech BD</title>
    
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* আপনার বর্তমান স্টাইলগুলো এখানে থাকলো */
        body {
            background-color: #06091a; 
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 40px auto;
            width: 95%;
        }

        .chat-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            height: 550px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #messages::-webkit-scrollbar { width: 6px; }
        #messages::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.3); border-radius: 10px; }

        .message-row { display: flex; gap: 10px; align-items: flex-end; }
        .message-row.user { flex-direction: row-reverse; }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 15px;
            max-width: 80%;
            line-height: 1.5;
        }

        .msg-bubble.ai {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 2px;
        }

        .msg-bubble.user {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .input-area {
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 10px;
        }

        #userInput {
            flex: 1;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 10px;
            padding: 12px 15px;
            color: white;
            outline: none;
        }

        .send-btn {
            background: #3b82f6;
            color: white;
            padding: 0 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .typing-indicator {
            font-size: 13px;
            color: #94a3b8;
            margin: 0 0 10px 20px;
            display: none;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-container" onclick="location.href='index.html'" style="cursor: pointer;">
            <img src="assets/images/logo.png" alt="Logo" class="nav-logo">
            <span class="logo-text">Ascend Tech BD</span>
        </div>
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
        <div class="nav-links" id="navLinks">
            <a href="index.html">হোম</a>
            <a href="about.html">আমাদের সম্পর্কে</a>
            <a href="services.html">সেবাসমূহ</a>
            <a href="projects.html">প্রজেক্ট</a>
            <a href="research.html">রিসার্চ</a>
            <a href="aichat.html" class="text-blue-400">AI সহায়তা</a>
        </div>
    </nav>

    <div class="chat-section">
        <h2 class="text-2xl font-bold mb-6 text-center">Aria AI সহকারী</h2>
        
        <div class="chat-box">
            <div id="messages"></div>
            <div id="typingIndicator" class="typing-indicator">Aria উত্তর লিখছে...</div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="এখানে আপনার প্রশ্ন লিখুন..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()">পাঠান</button>
            </div>
        </div>
    </div>

    <script>
        let conversationHistory = [];

        // পেজ লোড হলে ওয়েলকাম মেসেজ
        window.onload = () => {
            appendMessage('ai', "স্বাগতম! আমি Aria। Ascend Tech BD-র ডিজিটাল সহকারী। আমি আপনাকে কীভাবে সাহায্য করতে পারি?");
        };

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            appendMessage('user', text);
            conversationHistory.push({ role: 'user', content: text });
            input.value = '';

            const typing = document.getElementById('typingIndicator');
            typing.style.display = 'block';

            try {
                // আপনার রেন্ডার সার্ভার লিঙ্ক (অবশ্যই শেষে /chat থাকতে হবে)
                const SERVER_URL = 'https://ascendtechbd-github-io.onrender.com/chat'; 

                const response = await fetch(SERVER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile', 
                        messages: [
                            { role: 'system', content: 'তুমি Aria, Ascend Tech BD-র একজন বন্ধুত্বপূর্ণ AI রিসেপশনিস্ট। সব উত্তর বাংলায় দাও।' },
                            ...conversationHistory
                        ]
                    })
                });

                if (!response.ok) throw new Error('সার্ভার থেকে রেসপন্স পাওয়া যায়নি');

                const data = await response.json();
                
                // সার্ভার থেকে আসা উত্তর প্রসেস করা
                if (data.choices && data.choices[0].message) {
                    const reply = data.choices[0].message.content;
                    appendMessage('ai', reply);
                    conversationHistory.push({ role: 'assistant', content: reply });
                } else {
                    throw new Error('ভুল ডাটা ফরম্যাট');
                }

            } catch (err) {
                console.error("Error Log:", err);
                appendMessage('ai', "⚠️ দুঃখিত, কানেকশন এরর! প্রথম মেসেজটি পাঠালে সার্ভার সজাগ হতে ১ মিনিট সময় নিতে পারে। দয়া করে আবার চেষ্টা করুন।");
            } finally {
                typing.style.display = 'none';
            }
        }

        function appendMessage(role, text) {
            const msgDiv = document.getElementById('messages');
            const row = document.createElement('div');
            row.className = `message-row ${role}`;
            row.innerHTML = `<div class="msg-bubble ${role}">${text.replace(/\n/g, '<br>')}</div>`;
            msgDiv.appendChild(row);
            msgDiv.scrollTop = msgDiv.scrollHeight;
        }

        function toggleMenu() {
            document.getElementById('navLinks').classList.toggle('active');
        }
    </script>
</body>
</html>
